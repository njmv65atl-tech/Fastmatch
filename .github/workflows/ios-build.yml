name: iOS Unsigned Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          swift --version
          
      - name: Download iOS Platform (Xcode 16 requirement)
        run: xcodebuild -downloadPlatform iOS || true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        working-directory: mobile-app/Fastmatch-Mobile
        run: npm install --legacy-peer-deps
        
      - name: Install CocoaPods
        working-directory: mobile-app/Fastmatch-Mobile/ios
        run: |
          rm -f Podfile.lock
          pod install --repo-update
        
      - name: Build iOS App (Unsigned)
        working-directory: mobile-app/Fastmatch-Mobile
        run: |
          set -o pipefail
          xcodebuild -workspace ios/FastMatch.xcworkspace \
            -scheme FastMatch \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" | tee build_log.txt

      - name: Print xcodebuild log on failure
        if: failure()
        working-directory: mobile-app/Fastmatch-Mobile
        run: |
          echo "==== XCODEBUILD ERROR LOG ===="
          grep -i -A 15 -B 5 "error:" build_log.txt | head -n 300 || true
          
      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Build-Log
          path: mobile-app/Fastmatch-Mobile/build_log.txt
            
      - name: Create IPA payload
        working-directory: mobile-app/Fastmatch-Mobile
        run: |
          mkdir -p Payload
          mv ios/build/Build/Products/Release-iphoneos/FastMatch.app Payload/
          zip -r FastMatch.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastMatch-iOS-App
          path: mobile-app/Fastmatch-Mobile/FastMatch.ipa
          retention-days: 7
