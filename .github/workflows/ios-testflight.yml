name: iOS TestFlight Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          swift --version
          
      - name: Download iOS Platform (Xcode 16 requirement)
        run: |
          xcrun simctl list || true
          xcodebuild -downloadPlatform iOS || true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        working-directory: mobile-app/Fastmatch-Mobile
        run: npm install
        
      - name: Install CocoaPods
        working-directory: mobile-app/Fastmatch-Mobile/ios
        run: |
          rm -f Podfile.lock
          pod install --repo-update
          
      - name: Run Fastlane to TestFlight
        working-directory: mobile-app/Fastmatch-Mobile/ios
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: "https://x-access-token:${{ secrets.MATCH_PAT }}@github.com/${{ github.repository_owner }}/fastmatch-certificates.git"
        run: fastlane beta
        
      - name: Print xcodebuild log on failure
        if: failure()
        run: |
          echo "==== XCODEBUILD ERROR LOG ===="
          tail -n 200 /Users/runner/Library/Logs/gym/*.log || true
          
      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Build-Log
          path: /Users/runner/Library/Logs/gym/
